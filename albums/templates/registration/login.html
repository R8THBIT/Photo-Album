{% extends 'albums/base.html' %}

{% block content %}
<div class="flex min-h-[60vh] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="text-center text-3xl font-bold tracking-tight text-slate-900">Sign in to your account</h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-sm sm:rounded-xl sm:px-10 border border-slate-200">
            <form method="post" class="space-y-4 [&_input]:mt-1 [&_input]:block [&_input]:w-full [&_input]:rounded-md [&_input]:border-slate-300 [&_input]:shadow-sm [&_input]:py-2 [&_input]:px-3 [&_input]:border [&_input]:focus:border-indigo-500 [&_input]:focus:ring-indigo-500 [&_input]:sm:text-sm [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-slate-700">
                {% csrf_token %}
                {{ form.as_p }}
                
                <div class="pt-2">
                    <button type="submit" class="flex w-full justify-center rounded-lg bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
        <p class="mt-4 text-center text-sm text-slate-600">
            Don't have an account? <a href="{% url 'register' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
