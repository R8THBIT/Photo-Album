<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Album Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex flex-col font-sans text-slate-900 antialiased">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 backdrop-blur-md bg-white/90">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <a href="{% url 'album_list' %}" class="text-xl font-bold tracking-tight text-indigo-600 hover:text-indigo-500 transition-colors">
                        📸 PhotoAlbum<span class="text-slate-800">Pro</span>
                    </a>
                </div>
                
                <div class="flex items-center gap-6">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-slate-600 hidden sm:inline">Welcome, <strong class="text-slate-900 font-semibold">{{ user.username }}</strong></span>
                        
                        <a href="{% url 'album_create' %}" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-500 transition-colors shadow-sm shadow-indigo-100">
                            + New Album
                        </a>
                        
                        <form id="logout-form" action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="button" onclick="submitLogout(event)" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors cursor-pointer">
                                Logout
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Login</a>
                        <a href="{% url 'register' %}" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-500 transition-colors shadow-sm">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400">
        &copy; Ruby A. Recto BSIT 3A - Photo Album Hub. All rights reserved.
    </footer>

    <script>
        function submitLogout(event) {
            event.preventDefault();
            document.getElementById('logout-form').submit();
        }
    </script>

</body>
</html>
