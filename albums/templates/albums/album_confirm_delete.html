{% extends 'albums/base.html' %}

{% block content %}
<div class="flex min-h-[60vh] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-lg">
            <div class="flex">
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Destructive Action</h3>
                    <div class="mt-2 text-sm text-red-700">
                        <p>Are you absolutely sure you want to delete <strong>"{{ object.title }}"</strong>? This action cannot be undone and will permanently erase all associated photos.</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bg-white py-8 px-4 shadow-sm sm:rounded-xl sm:px-10 border border-slate-200">
            <form method="post">
                {% csrf_token %}
                <div class="flex gap-4">
                    <button type="submit" class="flex w-full justify-center rounded-lg bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 transition-colors">
                        Yes, Delete Everything
                    </button>
                    <a href="{% url 'album_detail' object.pk %}" class="flex w-full justify-center rounded-lg bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
